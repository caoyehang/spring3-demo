server:
  port: 9999 # Spring Boot 启动端口
  servlet:
    context-path: / # 应用根路径

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/admin?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=utf-8 # MySQL 连接地址
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource # 使用 Druid 数据源
    druid:
      initial-size: 10 # 初始化连接数
      min-idle: 5 # 最小空闲连接数
      max-active: 20 # 最大连接数
      max-wait: 60000 # 获取连接最大等待时间，单位毫秒
      validation-query: SELECT 1 # 连接有效性检测 SQL
      test-while-idle: true # 空闲时检测连接
      time-between-eviction-runs-millis: 30000 # 空闲连接检测间隔，单位毫秒
      min-evictable-idle-time-millis: 60000 # 最小空闲存活时间，单位毫秒
      remove-abandoned: true # 是否清理废弃连接
      remove-abandoned-timeout: 1800 # 废弃连接超时时间，单位秒
      log-abandoned: true # 是否记录废弃连接日志
  data:
    redis:
      host: localhost # Redis 地址
      port: 6379 # Redis 端口
      open: true # 是否开启 Redis 缓存
      database: 0 # Redis 数据库编号
      timeout: 6000ms # 连接超时时间
      lettuce:
        pool:
          max-active: 100 # 连接池最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间，-1 表示不限制
          max-idle: 20 # 连接池最大空闲连接数
          min-idle: 5 # 连接池最小空闲连接数
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss # JSON 时间格式
    time-zone: Asia/Chongqing # JSON 时间时区

mybatis-plus:
  mapper-locations: classpath*:mappers/*.xml # Mapper XML 扫描路径
  configuration:
    auto-mapping-behavior: full # 自动映射复杂结果
    map-underscore-to-camel-case: true # 开启下划线转驼峰
